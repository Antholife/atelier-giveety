# Dev local — Next.js (Design Kit Anthony Chahat / Giveety)

name: giveety-design-kit

services:
  giveety-design-kit:
    container_name: giveety-design-kit
    image: giveety-design-kit:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: always
    ports:
      - "${NEXT_PORT:-3000}:3000"
    volumes:
      - .:/srv/app
